name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Toolchain version + components come from rust-toolchain.toml — same as nix dev shell.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # The Dockerfile is a multi-stage build that compiles gitprint inside
  # rust:alpine (no cross-compilation, ring works natively). Deps are compiled
  # in a separate layer cached by Docker's GHA layer cache — only invalidated
  # when Cargo.toml/Cargo.lock/build.rs change. Source changes recompile only
  # gitprint itself (~1-2 min warm vs 6+ min with a separate build-musl job).
  package:
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login is only needed when actually pushing (main branch pushes).
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags: PRs get a sha label only; main gets `nightly` + sha.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      # GHA layer cache: deps layer is restored from cache on warm runs so only
      # the gitprint source layer needs to rebuild (~1-2 min instead of 6+ min).
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Run all benchmarks and record results as "current". No regression
      # comparison here — GitHub-hosted runners have too much performance
      # variance between runs to produce a reliable baseline. The authoritative
      # check runs locally via `make bench-check` / `make release`, where
      # hardware is consistent.
      - name: Run benchmarks
        run: cargo bench --bench pipeline -- --save-baseline current
