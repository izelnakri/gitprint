name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Toolchain version + components come from rust-toolchain.toml — same as nix dev shell.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Build a fully-static musl binary natively inside rust:alpine (musl is the
  # default libc there — ring and all deps compile without cross-compilation).
  #
  # Caching fix: rust:alpine sets CARGO_HOME=/usr/local/cargo which is a
  # container-only path — the host runner cannot see it, so actions/cache
  # silently saves/restores nothing. Redirecting CARGO_HOME into the workspace
  # (shared between host and container via Docker volume mount) makes both
  # .cargo/ and target/ accessible to the host-side cache action.
  # The Rust version is included in the cache key so a new rust:alpine image
  # (with a newer Rust release) gets a fresh cache instead of stale artifacts.
  build-musl:
    needs: [check]
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - uses: actions/checkout@v4
      - run: apk add --no-cache git
      - name: Redirect CARGO_HOME into workspace and capture Rust version
        id: env
        run: |
          echo "CARGO_HOME=$GITHUB_WORKSPACE/.cargo" >> $GITHUB_ENV
          echo "rustc=$(rustc --version)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: |
            .cargo/registry
            .cargo/git
            target/
          key: musl-${{ steps.env.outputs.rustc }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: musl-${{ steps.env.outputs.rustc }}-
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: gitprint-musl
          path: target/release/gitprint

  package:
    needs: [build-musl]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Download the musl binary built by build-musl into the Docker build context.
      - uses: actions/download-artifact@v4
        with:
          name: gitprint-musl
      - run: chmod +x gitprint

      - uses: docker/setup-buildx-action@v3

      # Login is only needed when actually pushing (main branch pushes).
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags: PRs get a sha label only; main gets `nightly` + sha.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      # Docker build is now just: apk add git + COPY pre-built binary (~30 sec).
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Run all benchmarks and record results as "current". No regression
      # comparison here — GitHub-hosted runners have too much performance
      # variance between runs to produce a reliable baseline. The authoritative
      # check runs locally via `make bench-check` / `make release`, where
      # hardware is consistent.
      - name: Run benchmarks
        run: cargo bench --bench pipeline -- --save-baseline current
